<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kelime Kutusu">
<meta name="theme-color" content="#20403A">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>Oxford 5000 · Kelime Kutusu</title>
<style>
:root{
  --board:#20403A;
  --board-deep:#18332E;
  --chalk:#EAE5D3;
  --chalk-dim:#A8B5A6;
  --paper:#FAF6EA;
  --paper-shadow:#E4DCC6;
  --rule:#C3D4E4;
  --redline:#C4453C;
  --ink:#28323A;
  --ink-soft:#5A6570;
  --green:#3E7C4F;
  --amber:#C98A2D;
  --focus:#F2C94C;
}
*{margin:0;padding:0;box-sizing:border-box}
button,.card{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.card{-webkit-user-select:none;user-select:none}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(ellipse at 50% -20%, #2A4E46 0%, var(--board) 55%, var(--board-deep) 100%);
  color:var(--chalk);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:20px 14px 40px;
}
.wrap{width:100%;max-width:640px;display:flex;flex-direction:column;gap:18px}

/* ---------- header ---------- */
header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
h1{font-family:Georgia,"Iowan Old Style",serif;font-weight:400;font-size:26px;letter-spacing:.5px}
h1 em{font-style:normal;color:var(--focus);border-bottom:2px dashed rgba(242,201,76,.45);padding-bottom:2px}
.sub{font-size:12.5px;color:var(--chalk-dim);letter-spacing:.4px}

/* ---------- panels ---------- */
.panel{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(234,229,211,.14);
  border-radius:10px;padding:14px 16px;
}
.panel h2{font-size:12px;text-transform:uppercase;letter-spacing:1.4px;color:var(--chalk-dim);font-weight:600;margin-bottom:10px}

/* level toggles */
.levels{display:flex;gap:8px;flex-wrap:wrap}
.lvl{
  font-size:13.5px;font-weight:600;letter-spacing:.5px;
  padding:7px 14px;border-radius:999px;cursor:pointer;
  border:1.5px solid rgba(234,229,211,.35);background:transparent;color:var(--chalk-dim);
  transition:all .15s;
}
.lvl[aria-pressed="true"]{background:var(--chalk);color:var(--ink);border-color:var(--chalk)}
.lvl .n{font-weight:400;opacity:.65;font-size:11.5px;margin-left:4px}
.newcount{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:13.5px;color:var(--chalk-dim)}
.newcount input{width:72px;padding:8px;border-radius:6px;border:1px solid rgba(234,229,211,.3);background:rgba(0,0,0,.2);color:var(--chalk);font-size:16px;text-align:center}
.newcount input:focus{outline:2px solid var(--focus);outline-offset:1px}

/* ---------- start / done ---------- */
.bigbtn{
  display:block;width:100%;padding:15px;border-radius:10px;border:none;cursor:pointer;
  background:var(--chalk);color:var(--ink);font-size:16.5px;font-weight:700;letter-spacing:.3px;
  font-family:inherit;transition:transform .1s;
}
.bigbtn:hover{transform:translateY(-1px)}
.bigbtn:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.bigbtn:disabled{opacity:.4;cursor:default;transform:none}
.startinfo{font-size:14px;color:var(--chalk-dim);margin-bottom:12px;line-height:1.6}
.startinfo b{color:var(--chalk)}

/* ---------- card ---------- */
.stage{display:none;flex-direction:column;gap:14px}
.stage.on{display:flex}
.progressline{display:flex;justify-content:space-between;font-size:12.5px;color:var(--chalk-dim);letter-spacing:.4px}
.card{
  position:relative;background:var(--paper);color:var(--ink);
  border-radius:6px;min-height:320px;cursor:pointer;
  box-shadow:0 1px 0 var(--paper-shadow),0 10px 28px rgba(0,0,0,.35),0 2px 6px rgba(0,0,0,.25);
  background-image:
    linear-gradient(90deg, transparent 43px, var(--redline) 43px, var(--redline) 45px, transparent 45px),
    repeating-linear-gradient(180deg, transparent 0, transparent 27px, var(--rule) 27px, var(--rule) 28px);
  background-position:0 56px,0 56px;
  background-repeat:no-repeat,repeat;
  background-size:100% calc(100% - 56px),100% 28px;
  padding:20px 26px 22px 60px;
  display:flex;flex-direction:column;justify-content:center;
  transition:transform .12s;
}
.card:active{transform:scale(.995)}
.card:focus-visible{outline:3px solid var(--focus);outline-offset:3px}
.card .lvltag{
  position:absolute;top:14px;right:16px;
  font-size:11px;font-weight:700;letter-spacing:1.2px;
  color:var(--redline);border:1.5px solid var(--redline);border-radius:4px;padding:3px 8px;
  transform:rotate(2deg);
}
.card .word{
  font-family:Georgia,"Iowan Old Style",serif;
  font-size:clamp(34px,8vw,48px);line-height:1.1;overflow-wrap:anywhere;
}
.card .hint{margin-top:14px;font-size:13px;color:var(--ink-soft)}
.card .pos{font-style:italic;color:var(--ink-soft);font-size:15px;margin-top:6px}
.card .tr{font-family:Georgia,serif;font-size:24px;font-weight:700;margin-top:12px;color:var(--ink)}
.card .ipa{font-family:Georgia,serif;font-size:19px;margin-top:10px;color:var(--redline)}
.card .ex{margin-top:16px;font-size:16px;line-height:1.55;font-family:Georgia,serif}
.card .ex::before{content:"“";color:var(--ink-soft)}
.card .ex::after{content:"”";color:var(--ink-soft)}
.cardlinks{display:flex;gap:14px;margin-top:18px;align-items:center;flex-wrap:wrap}
.cardlinks button,.cardlinks a{
  font-size:13px;font-weight:600;color:var(--ink);background:none;border:none;cursor:pointer;
  border-bottom:1.5px solid var(--ink-soft);padding-bottom:1px;text-decoration:none;font-family:inherit;
}
.cardlinks button:focus-visible,.cardlinks a:focus-visible{outline:2px solid var(--redline);outline-offset:2px}

/* grade buttons */
.grades{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grades button{
  padding:14px 6px;border-radius:9px;border:none;cursor:pointer;
  font-size:15px;font-weight:700;font-family:inherit;color:#fff;letter-spacing:.2px;
  transition:transform .1s,opacity .15s;
}
.grades button:hover{transform:translateY(-1px)}
.grades button:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.grades .no{background:var(--redline)}
.grades .hard{background:var(--amber)}
.grades .yes{background:var(--green)}
.grades .key{display:block;font-size:10.5px;font-weight:400;opacity:.75;margin-top:3px}
.grades[aria-hidden="true"]{visibility:hidden}

/* ---------- Leitner shelf ---------- */
.shelf{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.box{
  border:1px solid rgba(234,229,211,.18);border-radius:8px;padding:10px 6px 8px;text-align:center;
  background:rgba(0,0,0,.14);
}
.box .cnt{font-family:Georgia,serif;font-size:20px;color:var(--chalk)}
.box .lbl{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--chalk-dim);margin-top:3px}
.box.due .cnt{color:var(--focus)}
.shelfnote{font-size:11.5px;color:var(--chalk-dim);margin-top:8px;line-height:1.5}

/* done screen */
.done{text-align:center;padding:30px 10px}
.done .big{font-family:Georgia,serif;font-size:30px;margin-bottom:8px}
.done p{color:var(--chalk-dim);font-size:14px;line-height:1.6;margin-bottom:18px}
.backupbar{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
.miniBtn{font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid rgba(234,229,211,.35);background:transparent;color:var(--chalk-dim);cursor:pointer}
.miniBtn:hover{color:var(--chalk);border-color:var(--chalk)}
.savenote{font-size:11.5px;color:var(--chalk-dim);text-align:center}
.savenote.err{color:var(--amber)}

@media (max-width:480px){
  .shelf{grid-template-columns:repeat(3,1fr)}
  .card{padding-left:44px;min-height:300px}
  .card .word{font-size:34px}
  .card .tr{font-size:21px}
  .grades{gap:8px}
  .grades button{padding:16px 4px;font-size:14.5px}
  body{padding-bottom:env(safe-area-inset-bottom)}
}
@media (hover:none){
  .grades .key{display:none}
  .card .hint{font-size:12.5px}
}
@media (prefers-reduced-motion:reduce){
  *{transition:none !important}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Kelime <em>Kutusu</em></h1>
    <div class="sub">Oxford 3000–5000 · Leitner aralıklı tekrar</div>
  </header>

  <!-- START -->
  <section id="start" class="stage on">
    <div class="panel">
      <h2>Seviye seç</h2>
      <div class="levels" id="levels"></div>
      <div class="newcount">
        <label for="npd">Oturum başına yeni kelime</label>
        <input id="npd" type="number" min="0" max="100" value="20">
      </div>
      <div class="newcount">
        <label for="mpd">Oturum başına en fazla tekrar</label>
        <input id="mpd" type="number" min="10" max="500" value="60">
      </div>
    </div>
    <div class="panel">
      <div class="startinfo" id="startinfo"></div>
      <button class="bigbtn" id="startbtn">Oturumu başlat</button>
    </div>
    <div class="panel">
      <h2>Kutuların durumu</h2>
      <div class="shelf" id="shelf"></div>
      <div class="shelfnote">Doğru bilinen kart bir sonraki kutuya geçer; tekrar aralığı 1 → 2 → 4 → 8 → 16 güne uzar. Bilinmeyen kart 1. kutuya döner. 5. kutudaki kelimeler öğrenilmiş sayılır.</div>
    </div>
    <div class="backupbar">
      <button type="button" class="miniBtn" id="expbtn">Yedeği indir</button>
      <button type="button" class="miniBtn" id="impbtn">Yedek yükle</button>
      <input type="file" id="impfile" accept=".json,application/json" style="display:none">
    </div>
    <div class="savenote" id="savenote"></div>
  </section>

  <!-- SESSION -->
  <section id="session" class="stage">
    <div class="progressline"><span id="pleft"></span><span id="pright"></span></div>
    <div class="card" id="card" tabindex="0" role="button" aria-label="Kartı çevirmek için tıkla veya boşluk tuşuna bas"></div>
    <div class="grades" id="grades" aria-hidden="true">
      <button class="no" id="g0">Bilmiyorum<span class="key">1 · kutu 1'e döner</span></button>
      <button class="hard" id="g1">Zor<span class="key">2 · kutuda kalır</span></button>
      <button class="yes" id="g2">Biliyorum<span class="key">3 · sonraki kutu</span></button>
    </div>
  </section>

  <!-- DONE -->
  <section id="donest" class="stage">
    <div class="panel done">
      <div class="big">Oturum bitti ✓</div>
      <p id="donesum"></p>
      <button class="bigbtn" id="againbtn">Başa dön</button>
    </div>
    <div class="panel">
      <h2>Kutuların durumu</h2>
      <div class="shelf" id="shelf2"></div>
    </div>
  </section>
</div>

const today=()=>Math.floor((Date.now()-new Date().getTimezoneOffset()*60000)/86400000);

// RAW: [word, types, level, ipa, example, mp3suffix, slug, turkish]
const WORDS=RAW.map((r,i)=>({i,w:r[0],t:r[1],l:r[2],p:r[3],e:r[4],m:r[5],s:r[6]||r[0],tr:r[7]||''}));

let state={sel:["A1","A2"],npd:20,mpd:60,cards:{}}; // cards[i]=[box,dueDay]
let canSave=true;

let backend=null; // "claude" | "local" | null
async function detectBackend(){
  try{
    if(window.storage&&window.storage.set){
      await window.storage.set(KEY+"-ping","1");backend="claude";return;
    }
  }catch(e){}
  try{
    localStorage.setItem(KEY+"-ping","1");localStorage.removeItem(KEY+"-ping");
    backend="local";return;
  }catch(e){}
  backend=null;canSave=false;
}
async function stGet(){
  if(backend==="claude"){
    try{const r=await window.storage.get(KEY);return r&&r.value?r.value:null;}catch(e){return null;}
  }
  if(backend==="local"){try{return localStorage.getItem(KEY);}catch(e){return null;}}
  return null;
}
async function stSet(v){
  if(backend==="claude"){await window.storage.set(KEY,v);return;}
  if(backend==="local"){localStorage.setItem(KEY,v);return;}
  throw new Error("no backend");
}
async function load(){
  await detectBackend();
  try{
    const v=await stGet();
    if(v){const s=JSON.parse(v);if(s&&s.cards){state=Object.assign(state,s);}}
  }catch(e){/* ilk kullanım */}
}
let saveT=null;
function save(){
  if(!canSave)return;
  clearTimeout(saveT);
  saveT=setTimeout(async()=>{
    try{await stSet(JSON.stringify(state));}
    catch(e){canSave=false;renderSaveNote();}
  },400);
}
function setupBackup(){
  const exp=document.getElementById("expbtn"),imp=document.getElementById("impbtn"),f=document.getElementById("impfile");
  if(!exp)return;
  exp.onclick=()=>{
    const blob=new Blob([JSON.stringify(Object.assign({v:1},state))],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="kelime-kutusu-yedek-"+new Date().toISOString().slice(0,10)+".json";
    a.click();URL.revokeObjectURL(a.href);
  };
  imp.onclick=()=>f.click();
  f.onchange=()=>{
    const file=f.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const s=JSON.parse(r.result);
        if(!s||typeof s.cards!=="object")throw new Error("gecersiz");
        state={sel:Array.isArray(s.sel)?s.sel:state.sel,npd:+s.npd||state.npd,cards:s.cards};
        save();renderLevels();renderStart();
        alert("Yedek yüklendi: "+Object.keys(state.cards).length+" kart ilerlemesi alındı.");
      }catch(e){alert("Bu dosya geçerli bir yedek değil.");}
      f.value="";
    };
    r.readAsText(file);
  };
}
function renderSaveNote(){
  const n=document.getElementById("savenote");
  if(canSave){n.textContent="İlerlemen otomatik kaydediliyor ("+(backend==="claude"?"Claude deposu":"tarayıcı hafızası")+"). Farklı tarayıcı/cihazda devam etmek için yedeği kullan.";n.className="savenote";}
  else{n.textContent="Kayıt kullanılamıyor — ilerleme yalnızca bu oturumda tutulacak. Kapatmadan önce \u201CYedeği indir\u201D ile kaydet.";n.className="savenote err";}
}

// ---------- selectors ----------
const $=id=>document.getElementById(id);
function show(id){["start","session","donest"].forEach(s=>$(s).classList.toggle("on",s===id));}

// ---------- level buttons ----------
function renderLevels(){
  const c=$("levels");c.innerHTML="";
  const counts={},learned={};
  WORDS.forEach(w=>{
    counts[w.l]=(counts[w.l]||0)+1;
    const c=state.cards[w.i];
    if(c&&c[0]>=5)learned[w.l]=(learned[w.l]||0)+1;
  });
  LEVELS.forEach(l=>{
    const b=document.createElement("button");
    b.className="lvl";b.setAttribute("aria-pressed",state.sel.includes(l));
    const rem=counts[l]-(learned[l]||0);
    b.innerHTML=l+'<span class="n">'+rem+"</span>";
    b.title=(learned[l]||0)+" öğrenildi / toplam "+counts[l];
    b.onclick=()=>{
      const on=state.sel.includes(l);
      if(on&&state.sel.length===1)return;
      state.sel=on?state.sel.filter(x=>x!==l):[...state.sel,l];
      save();renderLevels();renderStart();
    };
    c.appendChild(b);
  });
}

// ---------- pools ----------
function duePool(){
  const t=today();
  return WORDS.filter(w=>{
    const c=state.cards[w.i];
    return c&&c[0]>=1&&c[0]<5&&c[1]<=t&&state.sel.includes(w.l);
  }).sort((a,b)=>{
    const ca=state.cards[a.i],cb=state.cards[b.i];
    return (ca[0]-cb[0])||(ca[1]-cb[1]);
  });
}
function newPool(){
  return WORDS.filter(w=>!state.cards[w.i]&&state.sel.includes(w.l));
}
function boxCounts(){
  const b=[0,0,0,0,0,0];
  const seen=new Set(Object.keys(state.cards).map(Number));
  for(const k in state.cards){b[state.cards[k][0]]++;}
  b[0]=WORDS.length-seen.size;
  return b;
}
function renderShelf(el){
  const b=boxCounts();const t=today();
  const dueN=duePool().length;
  el.innerHTML="";
  const labels=["Yeni","Kutu 1","Kutu 2","Kutu 3","Kutu 4","Öğrenildi"];
  b.forEach((n,i)=>{
    const d=document.createElement("div");d.className="box";
    if(i>=1&&i<=4&&dueN>0)d.classList.toggle("due",false);
    d.innerHTML='<div class="cnt">'+n+'</div><div class="lbl">'+labels[i]+"</div>";
    el.appendChild(d);
  });
}
function renderStart(){
  const dueAll=duePool().length,due=Math.min(dueAll,state.mpd),neu=Math.min(state.npd,newPool().length);
  let info="Bugün tekrarı gelen <b>"+due+"</b> kart var, üzerine <b>"+neu+"</b> yeni kelime eklenecek.";
  if(dueAll>state.mpd)info="Birikmiş <b>"+dueAll+"</b> kart var; bu oturumda öncelikli <b>"+due+"</b> tanesi sorulacak, kalanı sonraki oturumlara taşınır.";
  $("startinfo").innerHTML=info;
  $("startbtn").disabled=(dueAll+neu===0);
  if(dueAll+neu===0)$("startinfo").innerHTML+="<br>Seçili seviyelerde bugünlük iş bitti — yarın tekrar gel veya seviye ekle.";
  renderShelf($("shelf"));
  renderSaveNote();
}

// ---------- session ----------
let queue=[],cur=null,revealed=false,doneCount=0,againCount=0,startTotal=0,audio=null;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startSession(){
  const due=duePool().slice(0,state.mpd);
  const neu=newPool().slice(0,state.npd);
  queue=shuffle([...shuffle(due),...neu]);
  startTotal=queue.length;doneCount=0;againCount=0;
  if(!queue.length)return;
  show("session");next();
}
function next(){
  if(!queue.length){finish();return;}
  cur=queue.shift();revealed=false;
  renderCard();
  $("card").focus({preventScroll:true});
}
function renderCard(){
  const c=$("card");
  $("pleft").textContent="Kalan: "+(queue.length+1);
  $("pright").textContent="Bitti: "+doneCount;
  $("grades").setAttribute("aria-hidden",!revealed);
  if(!revealed){
    c.innerHTML='<span class="lvltag">'+cur.l+'</span>'+
      '<div class="word">'+esc(cur.w)+'</div>'+
      '<div class="hint">'+(matchMedia('(hover:none)').matches?'çevirmek için dokun':'çevirmek için tıkla · boşluk')+'</div>';
  }else{
    let h='<span class="lvltag">'+cur.l+'</span>'+
      '<div class="word">'+esc(cur.w)+'</div>';
    if(cur.tr)h+='<div class="tr">'+esc(cur.tr)+'</div>';
    if(cur.t)h+='<div class="pos">'+esc(cur.t)+'</div>';
    if(cur.p)h+='<div class="ipa">'+esc(cur.p)+'</div>';
    if(cur.e)h+='<div class="ex">'+esc(cur.e)+'</div>';
    h+='<div class="cardlinks">';
    if(cur.m)h+='<button id="playbtn" type="button">🔊 Dinle</button>';
    h+='<a href="'+HREFP+encodeURIComponent(cur.s)+'" target="_blank" rel="noopener">Oxford\u2019da aç ↗</a></div>';
    c.innerHTML=h;
    const pb=$("playbtn");
    if(pb)pb.onclick=(ev)=>{ev.stopPropagation();play();};
    const a=c.querySelector("a");
    if(a)a.onclick=ev=>ev.stopPropagation();
  }
}
function play(){
  try{
    if(audio){audio.pause();}
    audio=new Audio(MP3P+cur.m);
    audio.play().catch(()=>{});
  }catch(e){}
}
function reveal(){if(!revealed){revealed=true;renderCard();}}
function grade(g){
  if(!revealed)return;
  const t=today();
  const c=state.cards[cur.i]||[0,t];
  let box=c[0];
  if(g===0){ // bilmiyorum
    box=1;state.cards[cur.i]=[box,t+INTERVAL[1]];
    queue.push(cur);againCount++;
  }else if(g===1){ // zor
    box=Math.max(1,box);state.cards[cur.i]=[box,t+1];
    doneCount++;
  }else{ // biliyorum
    box=Math.min(5,(c[0]===0?1:c[0]+1));
    state.cards[cur.i]=[box,t+(INTERVAL[box]||16)];
    doneCount++;
  }
  save();next();
}
function finish(){
  show("donest");
  const learned=boxCounts()[5];
  $("donesum").innerHTML="Bu oturumda <b>"+doneCount+"</b> kart tamamlandı"+
    (againCount?", "+againCount+" kart tekrara düştü":"")+
    ".<br>Toplam öğrenilen: <b>"+learned+"</b> / "+WORDS.length+" kelime.";
  renderShelf($("shelf2"));
}
function esc(s){return String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}

// ---------- wiring ----------
$("card").addEventListener("click",reveal);
$("card").addEventListener("keydown",e=>{if(e.key===" "||e.key==="Enter"){e.preventDefault();reveal();}});
$("g0").onclick=()=>grade(0);
$("g1").onclick=()=>grade(1);
$("g2").onclick=()=>grade(2);
document.addEventListener("keydown",e=>{
  if(!$("session").classList.contains("on"))return;
  if(e.key===" "&&!revealed){e.preventDefault();reveal();}
  if(revealed){
    if(e.key==="1")grade(0);
    if(e.key==="2")grade(1);
    if(e.key==="3")grade(2);
  }
});
$("startbtn").onclick=startSession;
$("againbtn").onclick=()=>{show("start");renderLevels();renderStart();};
$("npd").addEventListener("change",e=>{
  let v=parseInt(e.target.value,10);if(isNaN(v)||v<0)v=0;if(v>100)v=100;
  e.target.value=v;state.npd=v;save();renderStart();
});
$("mpd").addEventListener("change",e=>{
  let v=parseInt(e.target.value,10);if(isNaN(v)||v<0)v=0;if(v>100)v=100;
  e.target.value=v;state.mpd=v;save();renderStart();
});

(async()=>{
  await load();
  $("npd").value=state.npd;
  $("mpd").value=state.mpd||60;
  renderLevels();renderStart();setupBackup();
})();
</script>
</body>
</html>
